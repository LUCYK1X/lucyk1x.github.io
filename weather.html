    <style>
      .weather-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .weather-card {
        background: white;
        border-radius: 25px;
        padding: 25px;
        text-align: center;

        margin-top: 20px;
      }

        color: #e2e8f0;
      }
      .search-area {

        margin-bottom: 20px;
      }

        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 25px;
        font-size: 16px;
      }
      .search-area button {

        border: none;
        border-radius: 25px;
        cursor: pointer;
      }

      .city-name {

      .loading {

        padding: 40px;

      .error {

        text-align: center;
        padding: 20px;

      // ========== 天气描述翻译映射表 ==========

        Sunny: "晴朗",

        Overcast: "阴天",

        Drizzle: "毛毛雨",
      };

      // 获取元素
      const cityInput = document.getElementById("cityInput");
      const searchBtn = document.getElementById("searchBtn");
      const weatherResult = document.getElementById("weatherResult");

      // 暗色模式按钮文字（覆盖 theme.js 的默认行为）
      const toggleBtn = document.getElementById("darkModeToggle");
      if (localStorage.getItem("darkMode") === "enabled") {
        toggleBtn.innerHTML = "☀️ 亮色模式";
      } else {
        toggleBtn.innerHTML = "🌙 暗色模式";
      }

      // 天气查询函数
      async function getWeather() {
        const city = cityInput.value.trim();

        if (city === "") {
          alert("请输入城市名称！");
          return;
        }

        // 显示加载状态
        weatherResult.innerHTML = `
          <div class="loading">
            ⏳ 正在查询 ${city} 的天气...
          </div>
        `;

        try {
          const url = `https://wttr.in/${encodeURIComponent(city)}?format=j1&lang=zh`;
          const response = await fetch(url);

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();
          displayWeather(data, city);
        } catch (error) {
          console.error("获取天气失败:", error);
          weatherResult.innerHTML = `
            <div class="error">
              ❌ 查询失败，请检查城市名称是否正确<br>
              提示：试试输入 "北京" 或 "Shanghai"
            </div>
          `;
        }
      }

      // 显示天气信息
      function displayWeather(data, city) {
        try {
          const current = data.current_condition[0];
          const location = data.nearest_area[0];

          // 方案三：优先使用用户输入的城市名
          let cityName = city;

          // 如果用户输入的是英文，尝试翻译
          if (cityNameMap[cityName]) {
            cityName = cityNameMap[cityName];
          }

          // 天气描述翻译
          let weatherDesc = current.weatherDesc[0]?.value || "未知";
          if (weatherDescMap[weatherDesc]) {
            weatherDesc = weatherDescMap[weatherDesc];
          }

          const country = location.country[0]?.value || "";
          const temp = current.temp_C;
          const feelsLike = current.FeelsLikeC;
          const humidity = current.humidity;
          const windSpeed = current.windspeedKmph;

          // 根据天气描述选择表情
          let emoji = "🌤️";
          if (weatherDesc.includes("晴")) emoji = "☀️";
          if (weatherDesc.includes("云")) emoji = "☁️";
          if (weatherDesc.includes("雨")) emoji = "🌧️";
          if (weatherDesc.includes("雪")) emoji = "❄️";
          if (weatherDesc.includes("雾") || weatherDesc.includes("霾"))
            emoji = "🌫️";
          if (weatherDesc.includes("雷")) emoji = "⛈️";

          weatherResult.innerHTML = `
            <div class="weather-card">
              <div class="city-name">
                ${emoji} ${cityName} ${country ? `(${country})` : ""}
              </div>
              <div class="temp">${temp}°C</div>
              <div>🌡️ 体感温度：${feelsLike}°C</div>
              <div>${weatherDesc}</div>
              <hr style="margin: 15px 0;">
              <div>💧 湿度：${humidity}%</div>
              <div>💨 风速：${windSpeed} km/h</div>
            </div>
          `;
        } catch (error) {
          console.error("解析数据失败:", error);
          weatherResult.innerHTML = `
            <div class="error">
              ❌ 数据解析失败，请稍后重试
            </div>
          `;
        }
      }

      // 绑定事件
      searchBtn.onclick = getWeather;
      cityInput.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          getWeather();
        }
      });

      // 页面加载时自动查询默认城市（北京）
      setTimeout(() => {
        getWeather();
      }, 100);
