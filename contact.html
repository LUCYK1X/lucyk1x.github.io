<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>联系我 - 谛琼霖</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            line-height: 1.7;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 导航栏 */
        nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 15px 30px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 25px;
            transition: all 0.3s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        body.dark-mode nav a {
            color: #e2e8f0;
        }

        nav a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        /* 主标题 */
        h1 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff, #a8c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 两栏布局 */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* 卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .card h2 {
            font-size: 1.6rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 12px;
        }

        body.dark-mode .card h2 {
            color: #e2e8f0;
        }

        /* 联系方式列表 */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .contact-item i {
            font-size: 1.8rem;
            width: 45px;
            color: #a8c0ff;
        }

        .contact-item .info {
            flex: 1;
        }

        .contact-item .label {
            font-size: 0.8rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .contact-item .value {
            font-size: 1.1rem;
            font-weight: 500;
            color: white;
        }

        body.dark-mode .contact-item .value {
            color: #e2e8f0;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 15px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px rgba(168,192,255,0.5);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }

        body.dark-mode .form-group input,
        body.dark-mode .form-group textarea {
            background: rgba(0,0,0,0.3);
            color: #e2e8f0;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #a8c0ff, #3f2b96);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(168,192,255,0.4);
        }

        .form-note {
            text-align: center;
            margin-top: 15px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        /* 社交链接区域 */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
        }

        .social-link:hover {
            background: rgba(255,255,255,0.25);
            transform: translateX(5px);
        }

        .social-link i {
            font-size: 1.5rem;
            width: 30px;
        }

        /* 虚拟地图卡片 */
        .map-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
        }

        .map-placeholder {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 30px;
            margin-top: 15px;
        }

        .map-placeholder i {
            font-size: 4rem;
            color: #a8c0ff;
            margin-bottom: 15px;
        }

        /* 返回按钮 */
        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 30px;
            background: rgba(255,255,255,0.15);
            border-radius: 50px;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
        }

        .back-link a:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        /* 暗色模式切换按钮 */
        #darkModeToggle {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            font-weight: bold;
        }

        #darkModeToggle:hover {
            background: #1a252f;
            transform: scale(1.05);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
        }
        /* 当前页高亮 */
nav a.active {
    background: rgba(255,255,255,0.25);
    color: #006400 !important;
    transform: scale(1.05);
}
    </style>
</head>
<body>

<button id="darkModeToggle">🌙 暗色模式</button>

<div class="page">
    <nav>
        <a href="aboutme.html"><i class="fas fa-user"></i> 关于我</a>
        <a href="hobby.html"><i class="fas fa-heart"></i> 我的爱好</a>
        <a href="contact.html" class="active"><i class="fas fa-envelope"></i> 联系我</a>
        <a href="fruit.html"><i class="fas fa-apple-alt"></i> 水果列表</a>
        <a href="https://www.freecodecamp.org" target="_blank"><i class="fas fa-laptop-code"></i> 学习资源</a>
    </nav>

    <h1><i class="fas fa-paper-plane"></i> 联系我</h1>

    <div class="contact-grid">
        <!-- 左侧：联系方式卡片 -->
        <div class="card">
            <h2><i class="fas fa-address-card"></i> 联系方式</h2>
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <div class="info">
                        <div class="label">电子邮箱</div>
                        <div class="value">diqionglin@example.com</div>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fab fa-github"></i>
                    <div class="info">
                        <div class="label">GitHub</div>
                        <div class="value">github.com/diqionglin</div>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div class="info">
                        <div class="label">所在地</div>
                        <div class="value">🌌 蔚蓝星</div>
                    </div>
                </div>
                <div class="contact-item">
                    <i class="fas fa-globe"></i>
                    <div class="info">
                        <div class="label">个人网站</div>
                        <div class="value">diqionglin.dev (建设中)</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：联系表单卡片 -->
        <div class="card">
            <h2><i class="fas fa-envelope-open-text"></i> 给我留言</h2>
            <form action="https://httpbin.org/post" method="POST">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> 姓名</label>
                    <input type="text" id="name" name="name" placeholder="请输入你的姓名" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> 邮箱</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-comment"></i> 留言内容</label>
                    <textarea id="message" name="message" rows="4" placeholder="想对我说什么？"></textarea>
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> 发送留言
                </button>
                <div class="form-note">
                    💡 表单演示用，稍后会连接到真实邮箱
                </div>
            </form>
        </div>
    </div>

    <!-- 社交平台卡片 -->
    <div class="card" style="margin-bottom: 30px;">
        <h2><i class="fas fa-share-alt"></i> 社交平台</h2>
        <div class="social-grid">
            <a href="https://github.com/" target="_blank" class="social-link">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="https://www.bilibili.com/" target="_blank" class="social-link">
                <i class="fab fa-bilibili"></i> Bilibili
            </a>
            <a href="https://juejin.cn/" target="_blank" class="social-link">
                <i class="fab fa-zhihu"></i> 掘金
            </a>
            <a href="https://www.zhihu.com/" target="_blank" class="social-link">
                <i class="fab fa-twitter"></i> 知乎
            </a>
            <a href="https://developer.mozilla.org/" target="_blank" class="social-link">
                <i class="fab fa-codepen"></i> CodePen
            </a>
            <a href="#" class="social-link">
                <i class="fab fa-weixin"></i> 微信公众号
            </a>
        </div>
    </div>

    <!-- 虚拟地图卡片 -->
    <div class="map-card">
        <h2><i class="fas fa-map-pin"></i> 我在哪里</h2>
        <div class="map-placeholder">
            <i class="fas fa-star-of-life"></i>
            <p style="margin-top: 10px;">📍 蔚蓝星 · 互联网云端</p>
            <p style="font-size: 0.85rem; opacity: 0.7;">🌍 全球联网，随时在线</p>
        </div>
    </div>

    <div class="back-link">
        <a href="aboutme.html"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>
</div>

<script>
    // 暗色模式功能
    const toggleBtn = document.getElementById('darkModeToggle');
    
    if (localStorage.getItem('darkMode') === 'enabled') {
        document.body.classList.add('dark-mode');
        toggleBtn.innerHTML = '<i class="fas fa-sun"></i> 亮色模式';
    } else {
        toggleBtn.innerHTML = '<i class="fas fa-moon"></i> 暗色模式';
    }
    
    toggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        
        if (document.body.classList.contains('dark-mode')) {
            localStorage.setItem('darkMode', 'enabled');
            toggleBtn.innerHTML = '<i class="fas fa-sun"></i> 亮色模式';
        } else {
            localStorage.setItem('darkMode', 'disabled');
            toggleBtn.innerHTML = '<i class="fas fa-moon"></i> 暗色模式';
        }
    });
</script>

</body>
</html>
